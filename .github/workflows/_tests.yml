name: Tests

on:
  workflow_call:
jobs:
  lint:
    timeout-minutes: 5
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv tool install nox
      - name: Run lint
        timeout-minutes: 3
        run: nox -s lint

  tests:
    timeout-minutes: 30
    name: Tests / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: ${{ matrix.python-version }}
      - run: uv tool install nox
      - name: Run tests
        timeout-minutes: 5
        run: nox -s "tests-${{ matrix.python-version }}"

  free-threaded-tests:
    timeout-minutes: 10
    name: Tests / Python 3.14t (free-threaded)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.14t"
      - run: uv tool install nox
      - name: Run free-threaded tests
        timeout-minutes: 5
        run: nox -s free_threaded_tests
