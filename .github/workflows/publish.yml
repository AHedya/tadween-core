name: Publish

on:
  push:
    tags:
      - v*

jobs:
  check-ci:
    name: Verify CI # deduplicate running the same tests twice.
    runs-on: ubuntu-latest
    steps:
      - name: Check for successful CI run
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head_sha: context.sha,
              workflow_id: 'ci.yml',
              status: 'success'
            });
            if (runs.data.total_count === 0) {
              core.setFailed(
                `No successful CI run found for commit ${context.sha}. ` +
                `Ensure CI passes on main before tagging.`
              );
            }

  publish:
    needs: check-ci
    name: Build
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7

      - name: Verify tag matches pyproject.toml version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          TOML_VERSION=$(grep '^version' pyproject.toml | sed 's/.*= *"\(.*\)"/\1/')
          if [ "$VERSION" != "$TOML_VERSION" ]; then
            echo "ERROR: tag $TAG does not match pyproject.toml version $TOML_VERSION"
            exit 1
          fi

      - name: Build
        run: uv build

      - name: Publish
        run: uv publish

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.replace('refs/tags/', ''),
              name: context.ref.replace('refs/tags/', ''),
              generate_release_notes: true
            });
